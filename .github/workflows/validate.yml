name: Validate

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - beta
  workflow_call:

concurrency:
  group: ${{ github.event_name == 'workflow_call' && format('validate-call-{0}', github.run_id) || format('validate-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      ansible: ${{ steps.filter.outputs.ansible }}
      helm: ${{ steps.filter.outputs.helm }}
      helmfile: ${{ steps.filter.outputs.helmfile }}
      shell: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ansible:
              - 'metal/k3s/**'
            helm:
              - 'charts/**'
            helmfile:
              - 'helmfile/**'
              - 'helmfile.yaml.gotmpl'
            shell:
              - 'scripts/**'
              - 'spec/**'

  ansible-lint:
    name: Ansible Lint
    needs: changes
    if: needs.changes.outputs.ansible == 'true' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools via mise
        uses: jdx/mise-action@v2

      - name: Install Python dependencies
        run: poetry install

      - name: Check for playbook files
        id: check-files
        run: |
          if ls metal/k3s/playbooks/*.yml 1> /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No ansible playbooks found, skipping lint"
          fi

      - name: Install Ansible collections
        if: steps.check-files.outputs.exists == 'true'
        run: poetry run ansible-galaxy collection install -r metal/k3s/requirements.yml

      - name: Run ansible-lint
        if: steps.check-files.outputs.exists == 'true'
        run: mise run lint:ansible

  helm-lint:
    name: Helm Lint
    needs: changes
    if: needs.changes.outputs.helm == 'true' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install tools via mise
        uses: jdx/mise-action@v2

      - name: Run helm lint
        run: mise run lint:helm

  # helmfile-lint is disabled until a self-hosted runner with the SOPS key is available.
  # Helmfile lint requires secret decryption against the real prod environment — a CI age
  # key would expose credentials to GitHub. The plan is to deploy actions-runner-controller
  # on the homelab cluster so the key never leaves the network.
  # See ROADMAP.md P2 — Self-hosted runner for CI secret decryption.
  #
  # helmfile-lint:
  #   name: Helmfile Lint
  #   needs: changes
  #   if: needs.changes.outputs.helmfile == 'true' || github.event_name == 'workflow_call'
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - name: Run helmfile lint Dev Environment
  #       uses: docked-titan-foundation/helmkit@v1.1.0
  #       with:
  #         tool: helmfile
  #         args: "lint --skip-deps -f helmfile.yaml.gotmpl -e dev"
  #     - name: Run helmfile lint Prod Environment
  #       uses: docked-titan-foundation/helmkit@v1.1.0
  #       with:
  #         tool: helmfile
  #         args: "lint --skip-deps -f helmfile.yaml.gotmpl -e prod"

  shell-test:
    name: Shell BDD Tests
    needs: changes
    if: needs.changes.outputs.shell == 'true' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install tools via mise
        uses: jdx/mise-action@v2

      - name: Run shellspec BDD tests
        run: mise run test:shell

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install tools via mise
        uses: jdx/mise-action@v2

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm clean-install

      - name: Lint commit messages
        run: |
          FROM="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$FROM" ] || [ "$FROM" = "0000000000000000000000000000000000000000" ]; then
            FROM="HEAD~1"
          fi
          if ! git merge-base --is-ancestor "$FROM" HEAD 2>/dev/null; then
            FROM="HEAD~1"
          fi
          npx commitlint --from "$FROM" --to "${{ github.sha }}" --verbose
