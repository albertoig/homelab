name: Validate

on:
  pull_request:
  push:
    # branches-ignore: []
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for playbook files
        id: check-files
        run: |
          if ls metal/k3s/playbooks/*.yml 1> /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No ansible playbooks found, skipping lint"
          fi

      - name: Install dependencies
        if: steps.check-files.outputs.exists == 'true'
        run: |
          pip install ansible-core ansible-lint
          ansible-galaxy collection install ansible.posix

      - name: Run ansible-lint
        if: steps.check-files.outputs.exists == 'true'
        run: ansible-lint --project-dir metal/k3s