name: Validate

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - beta
  workflow_call:

concurrency:
  group: ${{ github.event_name == 'workflow_call' && format('validate-call-{0}', github.run_id) || format('validate-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load versions
        id: versions
        run: |
          echo "python=$(yq '.python' versions.yaml)" >> $GITHUB_OUTPUT
          echo "ansible_core=$(yq '.ansible_core' versions.yaml)" >> $GITHUB_OUTPUT
          echo "ansible_lint=$(yq '.ansible_lint' versions.yaml)" >> $GITHUB_OUTPUT
          echo "ansible_posix=$(yq '.ansible_posix' versions.yaml)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.versions.outputs.python }}

      - name: Check for playbook files
        id: check-files
        run: |
          if ls metal/k3s/playbooks/*.yml 1> /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No ansible playbooks found, skipping lint"
          fi

      - name: Install dependencies
        if: steps.check-files.outputs.exists == 'true'
        run: |
          pip install "ansible-core==${{ steps.versions.outputs.ansible_core }}" "ansible-lint==${{ steps.versions.outputs.ansible_lint }}"
          ansible-galaxy collection install "ansible.posix:==${{ steps.versions.outputs.ansible_posix }}"

      - name: Run ansible-lint
        if: steps.check-files.outputs.exists == 'true'
        run: ansible-lint --project-dir metal/k3s

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load versions
        id: versions
        run: echo "helm=$(yq '.helm' versions.yaml)" >> $GITHUB_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ steps.versions.outputs.helm }}

      - name: Run helm lint
        run: |
          for chart in charts/*/; do
            helm lint "$chart" || exit 1
          done

  helmfile-lint:
    name: Helmfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # helmkit version is tracked in versions.yaml but cannot be read dynamically
      # here because GitHub Actions does not support expressions in `uses:` fields.
      # Update this value manually when bumping helmkit in versions.yaml.
      - name: Run helmfile lint Dev Environment
        uses: docked-titan-foundation/helmkit@v1.1.0
        with:
          tool: helmfile
          args: "lint --skip-deps -f helmfile.yaml.gotmpl -e dev --state-values-file helmfile/environments/lint-values.yaml"

      - name: Run helmfile lint Prod Environment
        uses: docked-titan-foundation/helmkit@v1.1.0
        with:
          tool: helmfile
          args: "lint --skip-deps -f helmfile.yaml.gotmpl -e prod --state-values-file helmfile/environments/lint-values.yaml"

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Load versions
        id: versions
        run: echo "node=$(yq '.node' versions.yaml)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.versions.outputs.node }}

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm clean-install

      - name: Lint commit messages
        run: |
          FROM="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$FROM" ] || [ "$FROM" = "0000000000000000000000000000000000000000" ]; then
            FROM="HEAD~1"
          fi
          npx commitlint --from "$FROM" --to "${{ github.sha }}" --verbose
