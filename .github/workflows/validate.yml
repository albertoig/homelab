name: Validate

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - master
  workflow_call:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for playbook files
        id: check-files
        run: |
          if ls metal/k3s/playbooks/*.yml 1> /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No ansible playbooks found, skipping lint"
          fi

      - name: Install dependencies
        if: steps.check-files.outputs.exists == 'true'
        run: |
          pip install ansible-core ansible-lint
          ansible-galaxy collection install ansible.posix

      - name: Run ansible-lint
        if: steps.check-files.outputs.exists == 'true'
        run: ansible-lint --project-dir metal/k3s

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Run helm lint
        run: |
          for chart in charts/*/; do
            helm lint "$chart" || exit 1
          done

  helmfile-lint:
    name: Helmfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up helmfile
        run: |
          HELMFILE_VERSION=$(curl -s https://api.github.com/repos/helmfile/helmfile/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | sed 's/^v//')
          curl -fsSL -o /tmp/helmfile.tar.gz "https://github.com/helmfile/helmfile/releases/download/v${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/helmfile.tar.gz -C /tmp
          sudo mv /tmp/helmfile /usr/local/bin/helmfile
          rm /tmp/helmfile.tar.gz

      - name: Run helmfile lint
        run: |
          helmfile -f helmfile.yaml.gotmpl --state-values-file helmfile/environments/lint-values.yaml -e dev lint
          helmfile -f helmfile.yaml.gotmpl --state-values-file helmfile/environments/lint-values.yaml -e prod lint