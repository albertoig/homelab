name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - 'kseed/pyproject.toml'
      - 'kseed/poetry.lock'
      - 'kseed/**/*.py'
      - '.github/workflows/ci.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================
  # DEPENDENCY REVIEW - Only runs on PRs
  # Checks if new dependencies have known CVEs
  # ============================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on known vulnerabilities
          fail-on-severity: high

  # ============================================
  # LINT & FORMAT - Foundation of the pipeline
  # All other jobs depend on this passing
  # ============================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            kseed/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('kseed/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        working-directory: kseed
        run: poetry install

      - name: Run Ruff Check
        working-directory: kseed
        run: poetry run ruff check .

      - name: Run Ruff Format Check
        working-directory: kseed
        run: poetry run ruff format --check .

  # ============================================
  # SECURITY SCAN - Only runs if lint passes
  # Uses bandit to find security issues
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            kseed/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('kseed/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        working-directory: kseed
        run: poetry install

      - name: Install Bandit
        working-directory: kseed
        run: poetry run pip install bandit

      - name: Run Bandit Security Scan
        working-directory: kseed
        run: poetry run bandit -r kseed/ -x .venv/ -f json -o bandit-report.json --severity-level high

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: kseed/bandit-report.json

  # ============================================
  # UNIT TEST - Only runs if lint passes
  # Runs pytest with coverage
  # ============================================
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            kseed/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('kseed/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        working-directory: kseed
        run: poetry install

      - name: Run pytest
        working-directory: kseed
        run: poetry run pytest tests/ -v --cov=kseed --cov-report=xml --cov-report=term --junit-xml=pytest-report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: kseed/pytest-report.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: kseed/coverage.xml
          flags: unittests
          name: kseed
