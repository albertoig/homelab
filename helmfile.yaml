repositories:
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

environments:
  prod:
    values:
      - helm/environments/prod.yaml
    secrets:
      - helm/environments/prod.secrets.enc.yaml

helmDefaults:
  wait: true
  timeout: 600
  cleanupOnFail: true

releases:
  - name: prometheus
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: "57.2.0"
    values:
      - helm/values/prometheus-values.yaml.gotmpl
