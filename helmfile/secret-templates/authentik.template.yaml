# --- authentik ---
authentik:
  # Bootstrap API token for initial setup (generate with: openssl rand -hex 32)
  bootstrap_token: ""
  # Secret key for cryptographic operations (generate with: openssl rand -hex 32)
  secret_key: ""
  email:
    # Sender address (e.g., "Homelab <homelab@example.com>")
    from: ""
    # SMTP account password
    password: ""
    # SMTP server hostname (e.g., smtp.protonmail.ch)
    host: ""
    # SMTP account username
    username: ""
  # PostgreSQL credentials for Authentik's internal database
  postgresql:
    # Database user password
    password: ""
  # Admin user for Authentik (used to log in to Grafana via SSO)
  admin:
    # Admin user email
    email: ""
    # Admin user password
    password: ""
postgresql:
  auth:
    # PostgreSQL superuser password
    password: ""
