
bases:
- templates.yaml.gotmpl
- environments.yaml.gotmpl
- repositories.yaml

# Install Prometheus Operator CRDs first
releases:
  - name: prometheus-operator-crds
    namespace: prometheus
    chart: prometheus-community/prometheus-operator-crds
    version: "27.0.0"
    wait: true
    waitForJobs: true
    labels:
      app: monitoring
      type: crds
