[tools]
# Kubernetes
kubectl  = "1.33.0"

# Helm ecosystem
helm     = "4.2.0"
helmfile = "1.4.1"

# Secrets
sops     = "3.12.1"

# Cloud infrastructure
terraform = "1.14.5"

# Runtimes (used by commitlint and ansible)
node   = "24"
python = "3.12"
poetry = "latest"

# Spec Kit: `specify` CLI runs via `uvx` (see the `spec:init` task)
uv     = "0.11.17"

# CLI scripting
gum              = "0.17.0"
fzf              = "0.73.1"
jq               = "1.8.1"
yq               = "4.47.1"

# Testing
"asdf:poikilotherm/asdf-shellspec" = "0.28.1"

[env]
# Poetry creates the venv inside the project so `mise run clean` can wipe it
POETRY_VIRTUALENVS_IN_PROJECT = "true"

# Spec Kit AI-agent integration used by `mise run spec:init`. Defaults to Claude Code;
# override per-machine in the gitignored .mise.local.toml (e.g. AI_AGENT = "copilot").
# Supported values come from `specify check` (claude, copilot, gemini, cursor, …).
AI_AGENT = "claude"

# Place sensitive or machine-specific vars in .mise.local.toml (gitignored).
# See .mise.local.toml.example for all available variables and descriptions.

# ── Setup ─────────────────────────────────────────────────────────────────────

[tasks.setup]
description = "Bootstrap local environment (tools, helm plugins, git hooks, terraform)"
run = """
mise install
poetry install
npm install
./scripts/helm/install-plugins.sh
poetry run pre-commit install
poetry run pre-commit install --hook-type commit-msg
terraform -chdir=terraform init
"""

# ── Validation ────────────────────────────────────────────────────────────────

[tasks.check]
description = "Validate tools, Helm plugins, and Kubernetes cluster access"
run = "./scripts/infra/preflight.sh"

[tasks.doctor]
description = "Diagnose common cluster failure patterns  [env: dev|prod]  [--fix to remediate, --yes non-interactive]"
run = "./scripts/infra/doctor.sh"

# ── Cluster provisioning ──────────────────────────────────────────────────────

[tasks.provision]
description = "Provision the K3s cluster via Ansible  [playbook: site]"
run = "./metal/k3s/run.sh ${1:-site}"

# ── Helmfile deployment ───────────────────────────────────────────────────────

[tasks.install]
description = "Deploy all helmfile releases"
run = "./scripts/helm/install.sh"

[tasks."helmfile:update-locks"]
description = "Update helmfile lock files for all environments"
run = "./scripts/helm/update-locks.sh"

[tasks.destroy]
description = "Tear down all helmfile releases"
usage = '''
arg "<environment>" help="Target environment" {
  choices "dev" "prod"
}
'''
run = '''
./scripts/helm/destroy.sh "${usage_environment?}"
'''

[tasks."destroy:one"]
description = "Delete a single helmfile release — managed + deployed only  [env] [release] [--dry-run] [--yes]"
usage = '''
arg "[environment]" help="Target environment" {
  choices "dev" "prod"
}
arg "[release]" help="Release name or namespace/name to delete; omit to pick interactively"
flag "--dry-run" help="Preview the release and its dependents without deleting"
flag "--yes" help="Skip the confirmation (non-interactive); requires a release; prod still confirms"
'''
run = '''
./scripts/helm/destroy-one.sh ${usage_environment:-} ${usage_release:-} ${usage_dry_run:+--dry-run} ${usage_yes:+--yes}
'''

# ── Secrets management ────────────────────────────────────────────────────────

# These scripts select the environment via lib/env.sh (arg, ENV var, or prompt).
# mise appends task args (it does not set $1/$2), so keep the run lines bare and
# let the scripts read the appended args directly — same as check/doctor/install.

[tasks."openbao:preflight"]
description = "Check tools and cluster resources required for OpenBao setup  [env?]"
run = "./scripts/apps/setup-openbao-preflight.sh"

[tasks."openbao:setup"]
description = "Initialise and configure OpenBao after helmfile deploy  [env?]"
run = "./scripts/apps/setup-openbao.sh"

[tasks."openbao:unseal"]
description = "Unseal OpenBao with 3 of 5 keys after a restart/reboot  [env?]"
run = "./scripts/apps/unseal-openbao.sh"

[tasks."secrets:init"]
description = "Initialise secrets from templates  [env?]"
run = "./scripts/secrets/init.sh"

[tasks."secrets:encrypt"]
description = "Encrypt secrets  [env?]  [chart?]"
run = "./scripts/secrets/encrypt.sh"

[tasks."secrets:decrypt"]
description = "Decrypt secrets  [env?]  [chart?]"
run = "./scripts/secrets/decrypt.sh"

[tasks."secrets:check"]
description = "Validate secrets are present and complete for all environments"
run = "./scripts/secrets/validate.sh"

# ── Linting ───────────────────────────────────────────────────────────────────

[tasks.lint]
description = "Run all linters"
depends = ["lint:ansible", "lint:helm", "lint:helmfile"]

[tasks."lint:ansible"]
description = "Lint Ansible playbooks"
run = "mise exec -- poetry run ansible-lint --project-dir metal/k3s"

[tasks."lint:helm"]
description = "Lint custom Helm charts"
run = """
mise exec -- bash -c 'for chart in charts/*/; do helm lint "$chart" || exit 1; done'
"""

[tasks."lint:helmfile"]
description = "Lint helmfile configuration (dev + prod)"
run = """
mise exec -- helmfile --skip-deps -f helmfile.yaml.gotmpl -e dev --state-values-file helmfile/environments/lint-values.yaml lint
mise exec -- helmfile --skip-deps -f helmfile.yaml.gotmpl -e prod --state-values-file helmfile/environments/lint-values.yaml lint
"""

[tasks."lint:commits"]
description = "Lint commit messages with commitlint"
run = "mise exec -- npx commitlint --edit"

# ── Testing ───────────────────────────────────────────────────────────────────

[tasks."test:shell"]
description = "Run shellspec BDD tests for shell scripts"
run = "shellspec tests/shell"

# Gherkin acceptance scenarios (pytest-bdd) carry one of two tags:
#   @offline → no cluster needed; runs everywhere (locally AND in CI, every branch).
#   @online  → needs a reachable homelab-<env> cluster; runs locally only.
#
#   verify          → runs BOTH tags. Use locally; the @online scenarios need a cluster.
#   verify:offline  → runs ONLY @offline. This is exactly what CI runs on every branch.
[tasks.verify]
description = "Run all acceptance scenarios — offline + online (online needs a cluster)"
run = "poetry run pytest -m 'offline or online' tests/features"

[tasks."verify:offline"]
description = "Run only the offline acceptance scenarios (what CI runs on every branch)"
run = "poetry run pytest -m offline tests/features"

# ── Spec-Driven Development ─────────────────────────────────────────────────────

# Bootstrap / refresh the Spec Kit scaffolding and the AI-agent integration. Spec Kit is
# agent-agnostic; the agent comes from $AI_AGENT (default "claude", override in
# .mise.local.toml).
[tasks."spec:init"]
description = "Bootstrap/refresh Spec Kit scaffolding (specify init, $AI_AGENT integration)"
run = "uvx --from git+https://github.com/github/spec-kit.git specify init --here --integration \"$AI_AGENT\" --script sh --force"

[tasks.test]
description = "Run all integration tests"
usage = '''
arg "[environment]" help="Target environment" default="dev" {
  choices "dev" "prod"
}
'''
run = 'ENV="${usage_environment}" poetry run pytest'

[tasks."test:smoke"]
description = "Run smoke tests (HTTP endpoint checks)"
usage = '''
arg "[environment]" help="Target environment" default="dev" {
  choices "dev" "prod"
}
'''
run = 'ENV="${usage_environment}" poetry run pytest tests/smoke'

[tasks."test:k8s"]
description = "Run Kubernetes integration tests"
usage = '''
arg "[environment]" help="Target environment" default="dev" {
  choices "dev" "prod"
}
'''
run = 'ENV="${usage_environment}" poetry run pytest tests/k8s'


# ── Cleanup ───────────────────────────────────────────────────────────────────

[tasks.clean]
description = "Remove local build artifacts and dependency caches"
run = """
rm -rf node_modules
rm -rf .venv
rm -rf terraform/.terraform
find . -type d -name __pycache__ -not -path './.git/*' -exec rm -rf {} + 2>/dev/null || true
"""

# ── Terraform ─────────────────────────────────────────────────────────────────

[tasks."tf:init"]
description = "Initialise Terraform providers"
run = "terraform -chdir=terraform init"

# mise appends task args (it does not set $1), so the env must come after the
# hardcoded subcommand — keep these bare. terraform.sh defaults to dev when no
# env is appended (ENV="${2:-dev}").
[tasks."tf:plan"]
description = "Show Terraform execution plan  [env?: dev|prod, default dev]"
run = "./scripts/infra/terraform.sh plan"

[tasks."tf:apply"]
description = "Apply Terraform changes  [env?: dev|prod, default dev]"
run = "./scripts/infra/terraform.sh apply"

[tasks."tf:destroy"]
description = "Destroy Terraform-managed resources  [env?: dev|prod, default dev]"
run = "./scripts/infra/terraform.sh destroy"
  