---
k3s_cluster:
  children:
    server:
      hosts:
        YOUR_SERVER_IP:         # e.g. 192.168.1.10
    agent:
      hosts:
        YOUR_AGENT_IP_1:        # e.g. 192.168.1.11
        YOUR_AGENT_IP_2:        # e.g. 192.168.1.12 - remove if only one agent

  vars:
    ansible_port: 22
    ansible_user: YOUR_USERNAME
    ansible_ssh_private_key_file: ~/.ssh/homelab
    k3s_version: v1.32.0+k3s1
    become: true 
    ansible_become_method: sudo

    # Shared secret used to authenticate nodes joining the cluster.
    # Acts as a cluster password between server and agents.
    # Generate with: openssl rand -base64 64
    # Then encrypt this file with: sops --encrypt --in-place inventory.sops.yml
    token: "CHANGE_ME"

    api_endpoint: "{{ hostvars[groups['server'][0]]['ansible_host'] | default(groups['server'][0]) }}"

    # Optional overrides
    # extra_server_args: ""
    # extra_agent_args: ""
    # cluster_context: k3s-ansible
    # api_port: 6443

    # Example: disable built-in traefik if you want your own ingress
    # server_config_yaml: |
    #   disable:
    #     - traefik
