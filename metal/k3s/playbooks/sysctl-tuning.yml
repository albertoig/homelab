---
- name: Apply sysctl tuning for K3s workloads
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Set fs.inotify.max_user_watches
      ansible.posix.sysctl:
        name: fs.inotify.max_user_watches
        value: "524288"
        sysctl_set: true
        state: present
        reload: true

    - name: Set fs.inotify.max_user_instances
      ansible.posix.sysctl:
        name: fs.inotify.max_user_instances
        value: "512"
        sysctl_set: true
        state: present
        reload: true
