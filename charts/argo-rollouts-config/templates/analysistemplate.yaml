apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: argo-rollouts-config
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 30s
      count: 3
      successCondition: "result[0] >= 0.95"
      failureLimit: 1
      provider:
        prometheus:
          address: {{ .Values.analysis.prometheusAddress | quote }}
          # Demo probe: vector(1) always reports healthy so the sample Rollout
          # promotes automatically. Replace with a real SLI query (e.g. request
          # success ratio for {{ "{{args.service-name}}" }}) for production rollouts.
          query: "vector(1)"
