{{- if and .Values.ingress (.Values.ingress.enabled) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "external-ingress.fullname" . }}
  namespace: {{ .Values.service.namespace | default .Release.Namespace }}
  labels:
    {{- include "external-ingress.labels" . | nindent 4 }}
  {{- if .Values.ingress.annotations }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- if .Values.ingress.hostnames }}
    # Dynamic hostname annotation (use first hostname)
    external-dns.alpha.kubernetes.io/hostname: {{ first .Values.ingress.hostnames | quote }}
    {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "traefik" | quote }}
  {{- if .Values.ingress.hostnames }}
  tls:
    - hosts:
        {{- range .Values.ingress.hostnames }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ printf "%s-tls" (include "external-ingress.fullname" .) }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hostnames }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.service.name }}
                port:
                  number: {{ $.Values.service.port }}
    {{- end }}
{{- end }}