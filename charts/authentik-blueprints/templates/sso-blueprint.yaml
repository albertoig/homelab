apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-initial-config-blueprint
  namespace: auth-system
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: authentik-blueprints
data:
  grafana-sso.yaml: |
    version: 1
    metadata:
      name: Homelab SSO
      automatic_apply: true
    entries:

    # ============================================
    # CERTIFICATE (shared across providers)
    # ============================================
    - model: authentik_crypto.certificatekeypair
      state: present
      id: authentik-main-cert
      identifiers:
          name: authentik-main-cert
      attrs:
        name: authentik-main-cert
        certificate_data: !Env OAUTH_CERT_DATA
        key_data: !Env OAUTH_KEY_DATA

    # ============================================
    # USERS
    # ============================================
    - model: authentik_core.user
      state: present
      id: homelab-admin
      identifiers:
        username: !Env HOMELAB_ADMIN_USERNAME
      attrs:
        username: !Env HOMELAB_ADMIN_USERNAME
        name: !Env HOMELAB_ADMIN_NAME
        email: !Env HOMELAB_ADMIN_EMAIL
        is_active: true
        type: internal
        password: !Env HOMELAB_ADMIN_PASSWORD

    # ============================================
    # GROUPS
    # ============================================
    - model: authentik_core.group
      state: present
      id: group-grafana-admins
      identifiers:
        name: Grafana Admins
      attrs:
        name: Grafana Admins
        users:
          - !KeyOf homelab-admin
          - !Find [authentik_core.user, [username, akadmin]]

    - model: authentik_core.group
      state: present
      id: group-argocd-admins
      identifiers:
        name: ArgoCD Admins
      attrs:
        name: ArgoCD Admins
        users:
          - !KeyOf homelab-admin
          - !Find [authentik_core.user, [username, akadmin]]

    - model: authentik_core.group
      state: present
      id: group-openbao-admins
      identifiers:
        name: OpenBao Admins
      attrs:
        name: OpenBao Admins
        users:
          - !KeyOf homelab-admin
          - !Find [authentik_core.user, [username, akadmin]]

    # ============================================
    # MFA - TOTP enforcement on login
    # ============================================
    - model: authentik_stages_authenticator_totp.authenticatortotpstage
      state: present
      id: totp-setup-stage
      identifiers:
        name: totp-setup-stage
      attrs:
        name: totp-setup-stage
        friendly_name: "Set up Authenticator App"
        digits: 6

    - model: authentik_stages_authenticator_validate.authenticatorvalidatestage
      state: present
      id: mfa-validate-stage
      identifiers:
        name: mfa-validate-stage
      attrs:
        name: mfa-validate-stage
        not_configured_action: configure
        configuration_stages:
          - !KeyOf totp-setup-stage
        device_classes:
          - totp

    - model: authentik_flows.flowstagebinding
      state: present
      id: mfa-validate-binding
      identifiers:
        target: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
        order: 30
      attrs:
        target: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
        stage: !KeyOf mfa-validate-stage
        order: 30

    # ============================================
    # GRAFANA - Own provider + application
    # ============================================
    - model: authentik_providers_oauth2.oauth2provider
      state: present
      id: grafana-provider
      identifiers:
        name: grafana-provider
      attrs:
        name: grafana-provider
        client_id: !Env GRAFANA_CLIENT_ID
        client_secret: !Env GRAFANA_CLIENT_SECRET
        client_type: confidential
        # Authentik 2026.5+ requires grant types to be set explicitly; without
        # this the provider rejects the authorization-code flow Grafana uses
        # ("Invalid grant_type for provider"). refresh_token covers offline_access.
        grant_types:
          - authorization_code
          - refresh_token
        redirect_uris:
          - url: "https://grafana.internal.{{ .Values.root_dns }}/login/generic_oauth"
            matching_mode: strict
        signing_key: !KeyOf authentik-main-cert
        authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
        invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
        access_token_validity: "hours=1"
        refresh_token_validity: "days=30"
        sub_mode: hashed_user_id
        include_claims_in_id_token: true
        issuer_mode: global
        property_mappings:
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]

    # Application
    - model: authentik_core.application
      state: present
      id: grafana-app
      identifiers:
        slug: grafana
      attrs:
        name: Grafana
        slug: grafana
        provider: !KeyOf grafana-provider
        meta_launch_url: "https://grafana.internal.{{ .Values.root_dns }}/"
        policy_engine_mode: any

    # ============================================
    # ARGOCD - OAuth2 provider + application
    # ============================================
    - model: authentik_providers_oauth2.oauth2provider
      state: present
      id: argocd-provider
      identifiers:
        name: argocd-provider
      attrs:
        name: argocd-provider
        client_id: !Env ARGOCD_CLIENT_ID
        client_secret: !Env ARGOCD_CLIENT_SECRET
        client_type: confidential
        # Required since Authentik 2026.5 (see grafana-provider above).
        grant_types:
          - authorization_code
          - refresh_token
        redirect_uris:
          - url: "https://argocd.internal.{{ .Values.root_dns }}/auth/callback"
            matching_mode: strict
        signing_key: !KeyOf authentik-main-cert
        authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
        invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
        access_token_validity: "hours=1"
        refresh_token_validity: "days=30"
        sub_mode: hashed_user_id
        include_claims_in_id_token: true
        issuer_mode: per_provider
        property_mappings:
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]

    - model: authentik_core.application
      state: present
      id: argocd-app
      identifiers:
        slug: argocd
      attrs:
        name: ArgoCD
        slug: argocd
        provider: !KeyOf argocd-provider
        meta_launch_url: "https://argocd.internal.{{ .Values.root_dns }}/"
        policy_engine_mode: any

    # ============================================
    # OPENBAO - OAuth2/OIDC provider + application
    # ============================================
    - model: authentik_providers_oauth2.oauth2provider
      state: present
      id: openbao-provider
      identifiers:
        name: openbao-provider
      attrs:
        name: openbao-provider
        client_id: !Env OPENBAO_CLIENT_ID
        client_secret: !Env OPENBAO_CLIENT_SECRET
        client_type: confidential
        # Required since Authentik 2026.5 (see grafana-provider above).
        grant_types:
          - authorization_code
          - refresh_token
        # OpenBao OIDC auth method callbacks: the web UI (mount path "oidc") and
        # the CLI helper (`bao login -method=oidc`, which listens on localhost:8250).
        redirect_uris:
          - url: "https://openbao.internal.{{ .Values.root_dns }}/ui/vault/auth/oidc/oidc/callback"
            matching_mode: strict
          - url: "http://localhost:8250/oidc/callback"
            matching_mode: strict
        signing_key: !KeyOf authentik-main-cert
        authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
        invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
        access_token_validity: "hours=1"
        refresh_token_validity: "days=30"
        sub_mode: hashed_user_id
        include_claims_in_id_token: true
        issuer_mode: per_provider
        property_mappings:
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]

    - model: authentik_core.application
      state: present
      id: openbao-app
      identifiers:
        slug: openbao
      attrs:
        name: OpenBao
        slug: openbao
        provider: !KeyOf openbao-provider
        meta_launch_url: "https://openbao.internal.{{ .Values.root_dns }}/"
        policy_engine_mode: any