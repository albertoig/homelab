apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-initial-config-blueprint
  namespace: auth-system
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: authentik-blueprints
data:
  grafana-sso.yaml: |
    version: 1
    metadata:
      name: Homelab SSO
    entries:

    # ============================================
    # CERTIFICATE (shared across providers)
    # ============================================
    - model: authentik_crypto.certificatekeypair
      state: present
      id: authentik-main-cert
      identifiers:
          name: authentik-main-cert
      attrs:
        name: authentik-main-cert
        certificate_data: !Env OAUTH_CERT_DATA
        key_data: !Env OAUTH_KEY_DATA

    # ============================================
    # GROUPS
    # ============================================
    - model: authentik_core.group
      state: present
      id: group-grafana-admins
      identifiers:
        name: Grafana Admins
      attrs:
        name: Grafana Admin
        
    - model: authentik_core.group
      state: present
      id: group-argocd-admins
      identifiers:
        name: ArgoCD Admins
      attrs:
        name: ArgoCD Admins

    # ============================================
    # USERS
    # ============================================
    - model: authentik_core.user
      state: present
      id: homelab-admin
      identifiers:
        username: !Env HOMELAB_ADMIN_USERNAME
      attrs:
        username: !Env HOMELAB_ADMIN_USERNAME
        name: !Env HOMELAB_ADMIN_NAME
        email: !Env HOMELAB_ADMIN_EMAIL
        is_active: true
        type: internal
        password: !Env HOMELAB_ADMIN_PASSWORD

    # ============================================
    # GRAFANA - Own provider + application
    # ============================================
    - model: authentik_providers_oauth2.oauth2provider
      state: present
      id: grafana-provider
      identifiers:
        name: grafana-provider
      attrs:
        name: grafana-provider
        client_id: !Env GRAFANA_CLIENT_ID
        client_secret: !Env GRAFANA_CLIENT_SECRET
        client_type: confidential
        redirect_uris:
          - url: "https://grafana.internal.iglesias.cloud/login/generic_oauth"
            matching_mode: strict
        signing_key: !KeyOf authentik-main-cert
        authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
        invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
        access_token_validity: "hours=1"
        refresh_token_validity: "days=30"
        sub_mode: hashed_user_id
        include_claims_in_id_token: true
        issuer_mode: global
        property_mappings:
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
          - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]

    # Application
    - model: authentik_core.application
      state: present
      id: grafana-app
      identifiers:
        slug: grafana
      attrs:
        name: Grafana
        slug: grafana
        provider: !KeyOf grafana-provider
        meta_launch_url: https://grafana.internal.iglesias.cloud/
        policy_engine_mode: any