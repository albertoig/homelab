# ServiceAccount used by the Sensor to submit Workflows, and by the triggered
# Workflow's pods to run. Kept namespace-local so no cluster RBAC is needed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: operate-workflow-sa
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: argo-events-config
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: operate-workflow
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: argo-events-config
rules:
  - apiGroups: ["argoproj.io"]
    resources:
      - workflows
      - workflowtemplates
      - workflowtaskresults
      - workflowtasksets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: operate-workflow
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: argo-events-config
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: operate-workflow
subjects:
  - kind: ServiceAccount
    name: operate-workflow-sa
    namespace: {{ .Release.Namespace }}
