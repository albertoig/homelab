apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: webhook
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: argo-events-config
spec:
  service:
    ports:
      - port: {{ .Values.eventsource.port | int }}
        targetPort: {{ .Values.eventsource.port | int }}
  webhook:
    push:
      port: {{ .Values.eventsource.port | quote }}
      endpoint: {{ .Values.eventsource.endpoint }}
      method: {{ .Values.eventsource.method }}
