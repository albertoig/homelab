{{- if .Values.helloWorkflow.enabled }}
# One-shot hello-world Workflow that runs on install and proves the engine works
# (visible in the UI). Set helloWorkflow.enabled=false to stop recreating it.
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: hello-world
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: argo-workflows-config
spec:
  serviceAccountName: {{ .Values.workflowServiceAccount }}
  workflowTemplateRef:
    name: hello-world
{{- end }}
