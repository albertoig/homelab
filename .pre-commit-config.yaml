repos:
  - repo: local
    hooks:
      - id: ansible-lint
        name: ansible-lint
        entry: ansible-lint
        language: system
        types: [yaml]
        files: ^metal/k3s/
        always_run: true
        pass_filenames: false
        args: ["--project-dir", "metal/k3s"]
      - id: helm-lint
        name: helm-lint
        entry: bash
        language: system
        types: [yaml]
        files: ^charts/
        always_run: true
        pass_filenames: false
        args: ["-c", "for chart in charts/*/; do helm lint \"$chart\" || exit 1; done"]
      - id: helmfile-lint
        name: helmfile-lint
        entry: bash
        language: system
        types: [yaml]
        files: ^helmfile/
        always_run: true
        pass_filenames: false
        args: ["-c", "helmfile -f helmfile.yaml.gotmpl -e dev lint -l 'app!=gitops' && helmfile -f helmfile.yaml.gotmpl -e prod lint"]